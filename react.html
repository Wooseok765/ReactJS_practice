<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div id="d1"></div>

</body>
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
    const Container = () => {
        const [time, setTime] = React.useState(0);
        const myChange = (event) => { // got an event when onChange is executed
            setTime(event.target.value); // 입력된 데이터를 minutes state로 덮어씌움
        };

        const myReset = () => { //  한 줄짜리는 중괄호 없어도 됨, arrow function 값을 자동으로 반환함. 중괄호의 경우 return표시를 해야함
            setTime(0) // 최신화되어있는 minutes에 0을 곱하여 전체 minutes를 0으로 바꿈
        }

        const [fliped, setFliped] = React.useState(false);
        const myFlip = () => {
            myReset();
            setFliped((currentFliped) => !currentFliped); // 현재 fliped를 currentFliped를 placeholder로 받아서 반대로 만드는 것
        }

        return (<div>
            <h3>Super Converter</h3>
            <div>
                <label for="min">Minutes</label>
                <input
                    value={fliped ? time * 60 : time} // fliped가 true 일때는 time*60, false일때는 time을 표기
                    // 반대의 경우 hour에서 입력한 값에 60을 곱한 값이 표기되며 disabled에 의해 입력불가상태가 됨
                    id="min"
                    placeholder="Minuites" // state 초기값이 0이라서 표시 안됨(위의 value가 해당 칸에 state를 넣어버림)
                    type="number"
                    onChange={myChange}
                    disabled={fliped === true} //fliped의 상태가 true일 경우 disabled 활성화(입력불가상태). fliped는 리셋버튼 클릭 시 myFlip에서 바뀜
                />
            </div>
            <div>
                <label for="h">Hours</label>
                <input
                    value={fliped ? time : Math.round(time / 60)} // flip버튼 안누른 최초상태일 때 minute에 입력한 값에 60을 나눈값을 보여줌
                    id="h"
                    placeholder="Hours"
                    type="number"
                    onChange={myChange}
                    disabled={!fliped} // 초기값이 false니까 그 반대는 true, true일 때 disabled가 활성화 되니까 최초상태일 때 입력불가
                     /> 
            </div>
            <button onClick={myReset}>Reset</button>
            <button onClick={myFlip}>flip</button>
        </div>);
    };
    const div = document.querySelector("#d1");
    ReactDOM.render(<Container />, div);
</script>

</html>
