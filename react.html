<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div id="d1"></div>

</body>
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<!-- React JS는 interactive 한 UI 생성에 도움-->

<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<!--React element를 html에 넣을 수 있게 함-->

<script>
    const div = document.querySelector("#d1");
    // grab an element from html document
    
    const bt = React.createElement("button", {
        onClick: () => console.log("clicked!!")
    }, "Clcik me");
    const area = React.createElement("h2", {
        onMouseEnter: () => console.log("mouse came"),
        // set eventListener in property area, and set the function
         id: "sp", 
         style:{color: "red"} ,
        }, "This is click");
    // create React elements

    const container = React.createElement("div", null, [area, bt]);
    ReactDOM.render(container, div)
    // render(React element, html element(for location))
</script>

</html>
