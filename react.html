<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div id="d1"></div>

</body>
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
    const Container = () => {
        const [minutes, setMinutes] = React.useState("");
        const myChange = (event) => { // got an event when onChange is executed
            setMinutes(event.target.value); // 입력된 데이터를 minutes state로 덮어씌움
        };
        const myReset = () => {
            setMinutes(minutes * 0) // 최신화되어있는 minutes에 0을 곱하여 전체 minutes를 0으로 바꿈
        }
        return (<div>
            <h3>Super Converter</h3>
            <div>
                <label for="min">Minutes</label>
                <input
                    value={minutes}
                    /*input 안에 현재 rerender된 minutes state 값을 다시 표시함. 현재 창에 보이는 글자는 myChange작동 후 변환된 state를 다시 작성시켜놓은것*/
                    // 현재 기능 상 유저가 작성하는 공간에 value={minutes}를 했기 때문에 의미가 없지만 이렇게 하면 직접적인 컨트롤이 가능함
                    // value="hi" input에 hi라는 문자열을 채워넣음
                    id="min" placeholder="Minuites" type="number"
                    onChange={myChange}
                // onChange를 myChange를 작동시키지 않으면 value부분에서 minutes의 초기값 0을 계속 표시하기 때문에
                // input에 숫자를 타이핑 해도 input칸에서 볼 수 없다(입력은 되었지만 state인 mimutes를 계속 표기)
                />
            </div>
            <div>
                <label for="h">Hours</label>
                <input value={Math.round(minutes / 60)} id="h" placeholder="Hours" type="number" />
            </div>
            <button onClick={myReset}>Reset</button>
        </div>);
    };
    const div = document.querySelector("#d1");
    ReactDOM.render(<Container />, div);
</script>

</html>
