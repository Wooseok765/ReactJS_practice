<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div id="d1"></div>

</body>
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Import Babel transformer-->
<script type="text/babel">
    // the mentioning type is needed becasue the syntex below is JSX
    const div = document.querySelector("#d1");
    const BtJSX = () => (
        <button
            style={{
                backgroundColor: "tomato",
            }} // Reat's style takes object. The object is expressed in {}
            onClick={() => console.log("clicked!!")}>Click me</button>);
    // This code is defining a function creating a button
    // So, this component can be reused at the other place

    const H3 = () => (<h3 id="jsxId" style={{color:"red"}} onMouseEnter={() => console.log("mouser came")}>Hi there!</h3>);

    const Container = () =>
        <div>
            <H3 />
            <BtJSX />             
        </div>;
        // Two components are called inside of Container component
    ReactDOM.render(<Container />, div);
    // If Container is called, it will return element <div> that contain two components
    // and H#, BtJSX will be created at the same time
</script>

</html>
