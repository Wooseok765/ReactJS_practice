<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div id="d1"></div>

</body>
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">

    function CreateButton({buttonName, big}){ // object형태로 넘어온 props들의 key를 활용하는 것
        return (
            <button 
            style={{
                backgroundColor: "tomato",
                color: "blue",
                padding: "10px 20px",
                border: 0,
                borderRadius: 10,
                fontSize : big ? 20 : 10,
            }}>
                {buttonName}</button>
        )
    }
 
    const Container = () => {
        
        return (
            <div>
               <CreateButton buttonName = "OK" big = {true}/> 
               <CreateButton buttonName = "Cancel" big = {false}/>
            </div>
            // 컴포넌트 생성하면서 props를 자식 component로 보내는 방법
        )
    };
    const div = document.querySelector("#d1");
    ReactDOM.render(<Container />, div);
</script>

</html>
