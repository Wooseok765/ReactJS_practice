<!DOCTYPE html>
<html>

<head>

</head>

<body>
    <div id="d1"></div>

</body>
<script src="https://unpkg.com/react@17.0.2/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
    const div = document.querySelector("#d1");
    const Container = () => { // ()는 내부의 값을 반환한다는 의미, 내부에 많은것을작성해야 할 때는 {}사용할 것
        const [count, setCount] = React.useState(0);
        const modify = () => {
            setCount((current) => current + 1);
            // count값을 매개변수로 받아로 오른쪽을 실행
            // 여기서 count의 값이 변하게됨
        }
        return (<div>
            <h3>Total count: {count}</h3>
            <button style={{ backgroundColor: "red" }}/*onClick={() => modify()}이렇게 해도 된다*/ onClick={modify}>Click me</button>                                                        
        </div>); // return value
    };

    ReactDOM.render(<Container />, div);
</script>

</html>
